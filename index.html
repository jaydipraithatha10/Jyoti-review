<!DOCTYPE html>
<html lang="gu">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jyoti Gruh Udhyog - Customer Review</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


    .card{
    width:100%;
    max-width:430px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1.5px solid rgba(255,215,0,.45);
    border-radius:28px;
    padding:35px 25px;
    text-align:center;
    color:#fff;
    box-shadow:
    0 20px 50px rgba(0,0,0,.45),
    0 0 30px rgba(255,215,0,.25);
    position:relative;
    overflow:hidden;
}.card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:120%;
height:120%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.08),
transparent
);
transform:rotate(25deg);
animation:shineCard 6s linear infinite;
}

@keyframes shineCard{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

    

.diya{
    font-size:65px;
    animation:glow 1.8s infinite alternate;
    margin-bottom:10px;
}

@keyframes glow{
    from{
        filter:drop-shadow(0 0 5px gold);
    }
    to{
        filter:drop-shadow(0 0 25px gold);
    }
}

h1{
    font-size:30px;
    margin-bottom:8px;
    background:linear-gradient(90deg,#FFD700,#FFF5B8,#FFD700);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 3s linear infinite;
}

@keyframes shine{
    0%{
        background-position:-200% center;
    }
    100%{
        background-position:200% center;
    }
}
.subtitle{
    color:#f5f5f5;
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin:20px 0 30px;
}

.mainBtn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
cursor:pointer;
font-size:20px;
font-weight:700;
color:#083122;
background:linear-gradient(135deg,#FFD700,#F8E58C,#FFD700);
background-size:200% 200%;
box-shadow:0 0 20px rgba(255,215,0,.45);
transition:.35s;
animation:goldBtn 3s linear infinite;
}

.mainBtn:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 0 35px rgba(255,215,0,.7);
}

@keyframes goldBtn{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

    body::before,
body::after{
content:"";
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:radial-gradient(rgba(255,215,0,.18),transparent 70%);
pointer-events:none;
animation:floatGlow 12s linear infinite;
}

body::before{
top:-120px;
left:-120px;
}

body::after{
bottom:-120px;
right:-120px;
animation-delay:6s;
}

@keyframes floatGlow{
0%{
transform:translate(0,0) scale(1);
}
50%{
transform:translate(80px,60px) scale(1.2);
}
100%{
transform:translate(0,0) scale(1);
}
}
body{
    background:linear-gradient(135deg,#041b15,#0b3d2e,#145c43);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.mainBtn:hover{
    transform:scale(1.03);
}

.options{
    display:none;
    margin-top:25px;
}

.rateBtn{
    width:100%;
    border:none;
    cursor:pointer;
    padding:16px;
    margin:10px 0;
    border-radius:14px;
    font-size:19px;
    font-weight:bold;
    transition:.3s;
}

.rateBtn:hover{
    transform:translateY(-2px);
}

.excellent{
    background:#27ae60;
    color:#fff;
}

.good{
    background:#d4af37;
    color:#103226;
}

.improve{
    background:#c0392b;
    color:#fff;
}

.thanks{
    display:none;
    margin-top:25px;
    color:#f6d66c;
    font-size:22px;
    font-weight:bold;
    line-height:1.6;
}

.footer{
    margin-top:28px;
    color:#cfcfcf;
    font-size:14px;
}

@media(max-width:480px){
    h1{
        font-size:26px;
    }

    .subtitle{
        font-size:20px;
    }

    .mainBtn,
    .rateBtn{
        font-size:18px;
    }
}
.stars{
display:flex;
justify-content:center;
gap:12px;
font-size:42px;
margin-top:25px;
cursor:pointer;
}

.stars span{
    cursor:pointer;
    transition:.3s;
    filter:drop-shadow(0 0 8px gold);
}

.stars span:hover{
    transform:scale(1.25) rotate(-10deg);
    filter:drop-shadow(0 0 20px gold);
}

.stars span.active{
    color:#FFD700;
    transform:scale(1.15);
    filter:drop-shadow(0 0 20px gold);
}


.stars span:hover{
transform:scale(1.3) rotate(-10deg);
}

.tapText{
margin-top:12px;
color:#FFD700;
font-size:15px;
font-weight:600;
letter-spacing:1px;
}

@keyframes starGlow{
from{
filter:drop-shadow(0 0 5px gold);
}
to{
filter:drop-shadow(0 0 18px gold);
}
}
</style>
</head>

<body>

<div class="card">

<div class="diya">🪔</div>

<h1>Jyoti Gruh Udhyog</h1>

<div class="subtitle" id="subtitle">
તમને અમારી પ્રોડક્ટ કેવી લાગી?
</div>
<div class="stars" id="showBtn">
<span>⭐</span>
<span>⭐</span>
<span>⭐</span>
<span>⭐</span>
<span>⭐</span>
</div>

<div class="tapText">
Tap Stars to Give Rating
</div>


<div class="options" id="options">

<button class="rateBtn excellent" onclick="sendRating('😍 Excellent')">
😍 Excellent
</button>

<button class="rateBtn good" onclick="sendRating('😊 Good')">
😊 Good
</button>

<button class="rateBtn improve" onclick="sendRating('😕 Needs Improvement')">
😕 Needs Improvement
</button>

</div>

<div class="thanks" id="thanks">
🙏 ખૂબ ખૂબ આભાર!<br><br>
તમારો પ્રતિભાવ અમારા માટે ખૂબ જ કિંમતી છે.
</div>

<div class="footer">
© Jyoti Gruh Udhyog
</div>

</div>
<script>
const showBtn=document.getElementById("showBtn");
const options=document.getElementById("options");
const thanks=document.getElementById("thanks");


document.querySelectorAll(".stars span").forEach(function(star){
    star.addEventListener("click", function(){
        options.style.display = "block";
        document.querySelector(".stars").style.display = "none";
        document.querySelector(".tapText").style.display = "none";
    });
});
function sendRating(rating){

    thanks.style.display="block";
    options.style.display="none";
document.getElementById("subtitle").style.display="none";

    
const now = new Date();

const date = now.toLocaleDateString('en-GB');

const time = now.toLocaleTimeString('en-IN', {
    hour: '2-digit',
    minute: '2-digit'
});


const message = `
🌼 *JYOTI GRUH UDHYOG*

⭐ *CUSTOMER REVIEW*

⭐ *Rating*
${rating}

📅 *Date*
${date}

🕒 *Time*
${time}

🙏 *Thank You*`;



    setTimeout(function(){
        window.location.href="https://wa.me/919712149344?text="+encodeURIComponent(message);
    },1000);
}const stars = document.querySelectorAll(".stars span");


        });

        setTimeout(()=>{
            options.style.display="block";
            document.querySelector(".stars").style.display="none";
            document.querySelector(".tapText").style.display="none";
        },300);

    });
});

</script>

</body>
</html>
